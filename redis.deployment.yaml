apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:5.0
        ports:
        - containerPort: 6379
        resources:
          limits:
            memory: "128Mi"
        volumeMounts:
        - mountPath: /redis-master
          name: redis-volume
      volumes:
      - name: redis-volume
        configMap:
          name: redis-config